# Example HPC cluster profile.
# Create one [clusters.<name>] section per cluster.

[clusters.my-hpc]

# Login node hostname or full domain name.
# This is the real SSH destination for the login node.
# The default SSH port is 22 unless your cluster says otherwise.
login_host = "login.hpc.edu"

# Username used to SSH into the cluster.
# This is usually your HPC/Linux/Kerberos username, not your email address.
user = "your_username"

# Local nickname managed by hpc-jump for the active compute node.
# VS Code connects to this alias after hpc-jump points it at the Slurm node.
ssh_alias = "my-hpc-current"

# Slurm defaults for a lightweight editor session.
default_partition = "cpu_short"
default_time = "00-12:00:00"
default_cpus = 1
default_mem = "16G"

# Extra Slurm flags passed to salloc.
# Example for clusters that prefer memory per CPU:
# salloc_extra = ["--mem-per-cpu=30G"]
salloc_extra = []

# Slurm job name used for helper-created sessions.
# auto_reuse only attaches to running jobs with this exact name.
job_name_prefix = "hpc-jump"

# Automatically reuse an existing RUNNING hpc-jump Slurm job instead of requesting a new one.
auto_reuse = true

# Optional project folder opened automatically in VS Code.
remote_project_path = "/home/your_username/project"
